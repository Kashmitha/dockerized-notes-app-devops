version: "3.8"

services:
  backend:
   build: ./backend
   container_name: notes_backend
   ports:
     - "5000:5000"
   depends_on: 
     - redis

  frontend:
   build: ./frontend
   container_name: notes_frontend
   ports:
     - "8080:80"

  redis:
   image: redis:alpine
   container_name: notes_redis
